syntax = "proto3";

package search;

import "google/protobuf/empty.proto";

// Index service definition
service Index {
    rpc addToIndex (AddToIndexRequest) returns (google.protobuf.Empty);
    rpc addToIndexPage (AddToIndexRequestPage) returns (google.protobuf.Empty);
    rpc searchWord (SearchWordRequest) returns (SearchWordResponse);
    rpc searchPage (SearchPageRequest) returns (SearchPageResponse);
    rpc getStats (google.protobuf.Empty) returns (BarrelStats);

}

service Gateway {
    rpc putNew (PutNewRequest) returns (google.protobuf.Empty);
    rpc takeNext (google.protobuf.Empty) returns (TakeNextResponse);
    rpc searchWord (SearchWordRequest) returns (SearchWordResponse);
    rpc searchPage (SearchPageRequest) returns (SearchPageResponse);
    rpc getSystemStats (google.protobuf.Empty) returns (SystemStatsResponse);

}

message PutNewRequest {
    string url = 1;
}

// Messages for addToIndex method
message AddToIndexRequest {
    repeated string words = 1;
    string url = 2;
    string title = 3;
    string snippet = 4;
}

message AddToIndexRequestPage {
    string url_pointed = 1;
    string url_that_points = 2;
}

// Messages for searchWord method
message SearchWordRequest {
    repeated string words = 1;
}

message SearchResult {
    string url = 1;
    string title = 2;
    string snippet = 3;
}

message SearchWordResponse {
    repeated SearchResult results = 1;
}

// Messages for searchPage method
message SearchPageRequest {
    string url = 1;
}
message SearchPageResponse {
    repeated string urls = 1;
}

message TakeNextResponse {
    string url = 1;
}


message BarrelStats {
    string port = 1;
    int32 num_entries = 2;
    double avg_search_time = 3;
}

message SystemStatsResponse {
    repeated BarrelStats barrels = 1;
    repeated string top_searches = 2;
}
